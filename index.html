<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Red Carpet</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&display=swap");

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: "Source Code Variable", "Source Code Pro", monospace;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4vh 0;
      overflow: hidden;
    }

    .frame {
      position: relative;
      height: min(92vh, 160vw);
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 18px;
      background: #000;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    /* 사진 1은 항상 고정 */
    .fixed-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 제목, 사진2, 문단만 슬라이드 */
    .slides {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 300%;
      transform: translateY(0);
      transition: transform 900ms cubic-bezier(0.77, 0, 0.175, 1);
      will-change: transform;
    }

    .slide {
      position: relative;
      width: 100%;
      height: 33.333333%;
      overflow: hidden;
    }

    .cover-img {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: clamp(30px, 5.2vw, 68px);
      font-weight: 500;
      line-height: 0.82;
      letter-spacing: 0.06em;
      text-align: center;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.65);
    }

    .title span {
      font-weight: 500;
    }

    .title .bold {
      font-weight: 700;
    }

    .paragraph {
      position: absolute;
      z-index: 4;
      left: 9%;
      right: 9%;
      top: 24%;
      color: white;
      font-size: clamp(10px, 1.35vw, 14px);
      font-weight: 500;
      line-height: 1.22;
      letter-spacing: -0.02em;
      text-align: left;
      padding: 0;
      background: transparent;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
    }

    .arrow {
      position: absolute;
      z-index: 10;
      left: 50%;
      transform: translateX(-50%);
      border: none;
      background: transparent;
      color: white;
      font-family: "Source Code Variable", "Source Code Pro", monospace;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 500;
      cursor: pointer;
      opacity: 0.85;
      padding: 12px 20px;
      text-shadow: 0 3px 15px rgba(0, 0, 0, 0.8);
      transition:
        opacity 250ms ease,
        transform 250ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .arrow:hover {
      opacity: 1;
    }

    .arrow.down {
      bottom: 2.5%;
    }

    .arrow.up {
      top: 2.5%;
    }

    .arrow.down:hover {
      transform: translateX(-50%) translateY(5px);
    }

    .arrow.up:hover {
      transform: translateX(-50%) translateY(-5px);
    }
  </style>
</head>

<body>
  <main class="stage">
    <section class="frame">
      <!-- 사진 1은 여기서 고정됨 -->
      <img class="fixed-img" src="img1.png" alt="First project image" />

      <div class="slides">
        <!-- 1번째 화면: 제목만 슬라이드 -->
        <section class="slide">
          <h1 class="title">
            <span>THE</span>
            <span>RED</span>
            <span class="bold">CAR</span>
            <span>PET</span>
          </h1>

          <button class="arrow down" onclick="goToSlide(1)">↓</button>
        </section>

        <!-- 2번째 화면: 사진2가 사진1 위를 덮음 -->
        <section class="slide">
          <img class="cover-img" src="img2.png" alt="Second project image" />

          <button class="arrow up" onclick="goToSlide(0)">↑</button>
          <button class="arrow down" onclick="goToSlide(2)">↓</button>
        </section>

        <!-- 3번째 화면: 문단만 사진1 위에 올라옴 -->
        <section class="slide">
          <p class="paragraph">
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
          </p>

          <button class="arrow up" onclick="goToSlide(1)">↑</button>
        </section>
      </div>
    </section>
  </main>

  <script>
    const slides = document.querySelector(".slides");

    function goToSlide(index) {
      slides.style.transform = `translateY(-${index * 33.333333}%)`;
    }
  </script>
</body>
</html>
