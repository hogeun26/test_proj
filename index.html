<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Red Carpet</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&display=swap");

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 400vh;
      background: #111;
      font-family: "Source Code Variable", "Source Code Pro", monospace;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4vh 0;
      overflow: hidden;
    }

    .frame {
      position: relative;
      height: min(92vh, 160vw);
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 18px;
      background: #000;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .base-img,
    .cover-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .base-img {
      z-index: 1;
    }

    .cover-img {
      z-index: 3;
      transform: translateY(100%);
      will-change: transform;
    }

    .title {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: "Source Code Variable", "Source Code Pro", monospace;
      font-size: clamp(30px, 5.2vw, 68px);
      font-weight: 500;
      line-height: 0.82;
      letter-spacing: 0.06em;
      text-align: center;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.65);
      will-change: transform, opacity;
    }

    .title span {
      font-weight: 500;
    }

    .title .bold {
      font-weight: 700;
    }

    .paragraph {
      position: absolute;
      z-index: 2;
      left: 9%;
      right: 9%;
      top: 24%;
      transform: translateY(18px);
      opacity: 0;
      color: white;
      font-family: "Source Code Variable", "Source Code Pro", monospace;
      font-size: clamp(10px, 1.35vw, 14px);
      font-weight: 500;
      line-height: 1.22;
      letter-spacing: -0.02em;
      text-align: left;
      padding: 0;
      background: transparent;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
      will-change: transform, opacity;
    }
  </style>
</head>

<body>
  <main class="stage">
    <section class="frame">
      <img class="base-img" src="img1.png" alt="First project image" />

      <h1 class="title">
        <span>THE</span>
        <span>RED</span>
        <span class="bold">CAR</span>
        <span>PET</span>
      </h1>

      <p class="paragraph">
        Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
        Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
        Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
        Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
      </p>

      <img class="cover-img" src="img2.png" alt="Second project image" />
    </section>
  </main>

  <script>
    const title = document.querySelector(".title");
    const coverImg = document.querySelector(".cover-img");
    const paragraph = document.querySelector(".paragraph");

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateScrollAnimation() {
      const maxScroll =
        document.documentElement.scrollHeight - window.innerHeight;

      const progress = maxScroll > 0 ? window.scrollY / maxScroll : 0;

      const firstPhase = clamp(progress / 0.36, 0, 1);
      const secondPhase = clamp((progress - 0.36) / 0.32, 0, 1);
      const thirdPhase = clamp((progress - 0.68) / 0.18, 0, 1);

      title.style.transform = `translateY(${-130 * firstPhase}%)`;
      title.style.opacity = `${1 - firstPhase}`;

      if (progress <= 0.36) {
        coverImg.style.transform = `translateY(${100 - 100 * firstPhase}%)`;
      } else {
        coverImg.style.transform = `translateY(${-100 * secondPhase}%)`;
      }

      paragraph.style.opacity = `${thirdPhase}`;
      paragraph.style.transform = `translateY(${18 - 18 * thirdPhase}px)`;
    }

    window.addEventListener("scroll", updateScrollAnimation);
    window.addEventListener("resize", updateScrollAnimation);

    updateScrollAnimation();
  </script>
</body>
</html>
