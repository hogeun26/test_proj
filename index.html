<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Red Carpet</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&display=swap");

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: "Source Code Variable", "Source Code Pro", monospace;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4vh 0;
      overflow: hidden;
    }

    .frame {
      position: relative;
      height: min(92vh, 160vw);
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border-radius: 0;
      background: #000;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .fixed-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slides {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 300%;
      transform: translateY(0);
      transition: transform 950ms cubic-bezier(0.76, 0, 0.24, 1);
      will-change: transform;
    }

    .slide {
      position: relative;
      width: 100%;
      height: 33.333333%;
      overflow: hidden;
    }

    .cover-img {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: clamp(15px, 2.6vw, 34px);
      font-weight: 400;
      line-height: 0.82;
      letter-spacing: 0.06em;
      text-align: center;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.65);
      transform: translateY(-260px);
    }

    .title span {
      font-weight: 200;
    }

    .title .bold {
      font-weight: 600;
    }

    .paragraph {
      position: absolute;
      z-index: 4;
      left: 9%;
      right: 9%;
      top: 10%;
      color: white;
      font-size: clamp(10px, 1.35vw, 14px);
      font-weight: 250;
      line-height: 1.22;
      letter-spacing: -0.02em;
      text-align: left;
      padding: 0;
      background: transparent;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
    }

    .nav-arrow {
      position: absolute;
      z-index: 20;
      left: 50%;
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%);
      transition:
        opacity 280ms ease,
        visibility 280ms ease,
        transform 280ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .nav-arrow::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 15px;
      height: 15px;
      border-right: 2px solid white;
      border-bottom: 2px solid white;
      filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.8));
    }

    .nav-arrow.up {
      top: 3%;
    }

    .nav-arrow.down {
      bottom: 3%;
    }

    .nav-arrow.up::before {
      transform: translate(-50%, -35%) rotate(225deg);
    }

    .nav-arrow.down::before {
      transform: translate(-50%, -65%) rotate(45deg);
    }

    .nav-arrow.up:hover {
      transform: translateX(-50%) translateY(-4px);
    }

    .nav-arrow.down:hover {
      transform: translateX(-50%) translateY(4px);
    }

    .nav-arrow.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <main class="stage">
    <section class="frame">
      <img class="fixed-img" src="img1.png" alt="First project image" />

      <div class="slides">
        <section class="slide">
          <h1 class="title">
            <span>THE</span>
            <span>RED</span>
            <span class="bold">CAR</span>
            <span>PET</span>
          </h1>
        </section>

        <section class="slide">
          <img class="cover-img" src="img2.png" alt="Second project image" />
        </section>

        <section class="slide">
          <p class="paragraph">
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
            Hello Hello Hello Hello Hello Hello Hello Hello Hello Hello
          </p>
        </section>
      </div>

      <button class="nav-arrow up hidden" onclick="goToSlide(currentSlide - 1)" aria-label="Previous slide"></button>
      <button class="nav-arrow down" onclick="goToSlide(currentSlide + 1)" aria-label="Next slide"></button>
    </section>
  </main>

  <script>
    const slides = document.querySelector(".slides");
    const upArrow = document.querySelector(".nav-arrow.up");
    const downArrow = document.querySelector(".nav-arrow.down");

    let currentSlide = 0;
    const totalSlides = 3;

    function goToSlide(index) {
      currentSlide = Math.max(0, Math.min(index, totalSlides - 1));

      slides.style.transform = `translateY(-${currentSlide * 33.333333}%)`;

      upArrow.classList.toggle("hidden", currentSlide === 0);
      downArrow.classList.toggle("hidden", currentSlide === totalSlides - 1);
    }
  </script>
</body>
</html>
